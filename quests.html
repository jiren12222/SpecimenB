<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quests | SpecimenB</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 28px; font-weight: 600; color: #fff; letter-spacing: 0.5px; }
  .header p { color: #888; margin-top: 8px; font-size: 14px; }
  
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: #111118;
    border: 1px solid #1a1a2e;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .stat-value { font-size: 28px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 11px; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card.completed .stat-value { color: #4ade80; }
  
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1a1a2e;
  }
  
  .quest {
    background: #111118;
    border: 1px solid #1a1a2e;
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    gap: 18px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .quest:hover { border-color: #2a2a3e; }
  .quest.completed { opacity: 0.5; border-color: #1e3a2f; }
  .quest.completed::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 3px;
    background: #4ade80;
  }
  
  .quest-icon {
    width: 48px; height: 48px;
    background: #1a1a2e;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #888;
    flex-shrink: 0;
  }
  .quest.completed .quest-icon { background: #1e3a2f; color: #4ade80; }
  .quest.active .quest-icon { background: #4ade80; color: #0a0a0f; }
  
  .quest-body { flex: 1; }
  .quest-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .quest-name { font-size: 16px; font-weight: 600; color: #fff; }
  .quest-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .quest-badge.new { background: #1e3a5f; color: #60a5fa; }
  .quest-badge.hot { background: #3f1e1e; color: #f87171; }
  .quest-badge.done { background: #1e3a2f; color: #4ade80; }
  
  .quest-desc { font-size: 13px; color: #666; margin-bottom: 14px; line-height: 1.5; }
  
  .quest-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .quest-reward {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #4ade80;
  }
  .quest-reward-icon {
    width: 24px; height: 24px;
    background: #0f291e;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  
  .quest-btn {
    background: #1a1a2e;
    color: #ccc;
    border: 1px solid #2a2a3e;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quest-btn:hover { background: #2a2a3e; color: #fff; }
  .quest-btn:active { transform: scale(0.98); }
  .quest-btn.completed {
    background: #1e3a2f;
    color: #4ade80;
    border-color: #4ade80;
    cursor: default;
  }
  .quest-btn.completed::before { content: '✓ '; }
  
  .quest-progress {
    width: 100%;
    height: 3px;
    background: #1a1a2e;
    border-radius: 2px;
    margin-top: 12px;
    overflow: hidden;
  }
  .quest-progress-fill {
    height: 100%;
    background: #4ade80;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  
  .loading { color: #666; font-size: 12px; text-align: center; padding: 40px; }
  
  .nav {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid #1a1a2e;
  }
  .nav a {
    color: #888;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .nav a:hover, .nav a.active { color: #fff; background: #1a1a2e; }
  
  @media (max-width: 600px) {
    .stats-bar { grid-template-columns: 1fr; }
    .quest { flex-direction: column; align-items: stretch; }
    .quest-footer { flex-direction: column; gap: 12px; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/">Home</a>
    <a href="/points">Points</a>
    <a href="/quests" class="active">Quests</a>
  </div>
  
  <div class="header">
    <h1>Quests</h1>
    <p>Complete tasks, earn points, climb the leaderboard</p>
  </div>
  
  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="stat-value" id="totalQuests">--</div><div class="stat-label">Total Quests</div></div>
    <div class="stat-card completed"><div class="stat-value" id="completedQuests">--</div><div class="stat-label">Completed</div></div>
    <div class="stat-card"><div class="stat-value" id="totalRewards">--</div><div class="stat-label">Points Available</div></div>
  </div>
  
  <div class="section-title">Active Quests</div>
  <div id="questsList"><div class="loading">Loading quests...</div></div>
</div>

<script>
const API_BASE = window.location.origin;

async function fetchQuests() {
  try {
    const res = await fetch(API_BASE + '/api/points');
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    renderQuests(data);
  } catch (e) {
    console.error('Error:', e);
    document.getElementById('questsList').innerHTML = '<div class="loading">Unable to load quests. Check server.</div>';
  }
}

function renderQuests(data) {
  const quests = data.quests;
  const completed = quests.filter(q => q.completed).length;
  const available = quests.filter(q => !q.completed).reduce((sum, q) => sum + q.reward, 0);
  
  document.getElementById('totalQuests').textContent = quests.length;
  document.getElementById('completedQuests').textContent = completed;
  document.getElementById('totalRewards').textContent = available.toLocaleString();
  
  const container = document.getElementById('questsList');
  container.innerHTML = '';
  
  quests.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'quest ' + (q.completed ? 'completed' : 'active');
    
    const badge = q.completed ? 'done' : i === 0 ? 'hot' : 'new';
    const badgeText = q.completed ? 'Done' : i === 0 ? 'Hot' : 'New';
    
    div.innerHTML = `
      <div class="quest-icon">${q.icon}</div>
      <div class="quest-body">
        <div class="quest-header">
          <div class="quest-name">${q.name}</div>
          <div class="quest-badge ${badge}">${badgeText}</div>
        </div>
        <div class="quest-desc">${q.desc}</div>
        <div class="quest-footer">
          <div class="quest-reward">
            <div class="quest-reward-icon">+</div>
            ${q.reward.toLocaleString()} points
          </div>
          <button class="quest-btn ${q.completed ? 'completed' : ''}" onclick="${q.completed ? '' : 'completeQuest(\\'' + q.name + '\\', this)'}">
            ${q.completed ? 'Completed' : 'Start Quest'}
          </button>
        </div>
        ${q.completed ? '<div class="quest-progress"><div class="quest-progress-fill" style="width:100%"></div></div>' : '<div class="quest-progress"><div class="quest-progress-fill" style="width:0%"></div></div>'}
      </div>
    `;
    container.appendChild(div);
  });
}

async function completeQuest(name, btn) {
  btn.textContent = 'Processing...';
  btn.disabled = true;
  
  try {
    const res = await fetch(API_BASE + '/api/complete-quest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ quest: name })
    });
    const result = await res.json();
    if (result.success) {
      fetchQuests();
    } else {
      btn.textContent = 'Start Quest';
      btn.disabled = false;
    }
  } catch (e) {
    btn.textContent = 'Start Quest';
    btn.disabled = false;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  fetchQuests();
  setInterval(fetchQuests, 2000);
});
</script>
</body>
</html>
