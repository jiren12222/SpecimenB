<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpecimenB — Quest</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #050507;
  --green: #a3e635;
  --cyan: #22d3ee;
  --text: #f5f5f5;
  --text2: #8888a0;
  --border: rgba(255,255,255,0.15);
  --panel-bg: rgba(255,255,255,0.05);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
  -webkit-font-smoothing: antialiased;
}

.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px;
  background: rgba(5,5,7,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.back-btn {
  padding: 6px 14px; background: transparent;
  border: 1px solid rgba(163,230,53,0.3);
  color: #a3e635; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; cursor: pointer; border-radius: 4px;
  text-decoration: none;
}

.nav-logo .brand {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  font-weight: 700; letter-spacing: 0.1em; color: var(--text);
}

.container {
  padding: 80px 16px 40px;
  max-width: 800px; margin: 0 auto;
}

.page-header { margin-bottom: 32px; }
.page-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 32px; font-weight: 400;
}
.page-header p {
  color: var(--text2); font-size: 14px;
  margin-top: 8px; line-height: 1.6;
}

.points-badge {
  position: fixed; top: 70px; right: 16px; z-index: 99;
  padding: 8px 16px; background: rgba(163,230,53,0.1);
  border: 1px solid rgba(163,230,53,0.3); border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: #a3e635; font-weight: 700;
}

.progress-section {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
  margin-bottom: 32px;
}
.progress-header {
  display: flex; justify-content: space-between;
  margin-bottom: 12px;
}
.progress-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text2);
  text-transform: uppercase;
}
.progress-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; color: var(--green); font-weight: 700;
}
.progress-bar {
  height: 8px; background: rgba(255,255,255,0.05);
  border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--green);
  border-radius: 4px; transition: width 0.5s;
  width: 0%;
}

.stats-bar {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-bottom: 32px;
}
.stat-card {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; text-align: center;
}
.stat-value {
  font-size: 24px; font-weight: 700;
  color: var(--green);
}
.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text2);
  text-transform: uppercase; margin-top: 4px;
}

.section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.2em;
  margin-bottom: 16px;
}

.task-card {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
  margin-bottom: 12px;
}

.task-header {
  display: flex; justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}

.task-type {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  text-transform: uppercase; margin-bottom: 8px;
}
.task-type.twitter { background: rgba(29,161,242,0.1); color: #1da1f2; border: 1px solid rgba(29,161,242,0.2); }
.task-type.discord { background: rgba(88,101,242,0.1); color: #5865f2; border: 1px solid rgba(88,101,242,0.2); }
.task-type.telegram { background: rgba(0,136,204,0.1); color: #0088cc; border: 1px solid rgba(0,136,204,0.2); }
.task-type.retweet { background: rgba(163,230,53,0.1); color: #a3e635; border: 1px solid rgba(163,230,53,0.2); }

.task-title { font-size: 16px; font-weight: 600; }
.task-desc { font-size: 13px; color: var(--text2); margin-top: 6px; }

.task-points {
  padding: 6px 12px;
  background: rgba(163,230,53,0.08);
  border: 1px solid rgba(163,230,53,0.2); border-radius: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--green); white-space: nowrap;
}

.task-steps {
  display: flex; flex-direction: column;
  gap: 10px;
}

.step-row {
  display: flex; gap: 10px; align-items: center;
}

.step-btn {
  padding: 10px 20px; border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700;
  cursor: pointer; border: none;
  text-transform: uppercase; white-space: nowrap;
}

.step-btn.follow {
  background: #1da1f2; color: #fff;
}
.step-btn.verify {
  background: #f59e0b; color: #000;
}
.step-btn.verify:disabled {
  background: #333; color: #666; cursor: not-allowed;
}
.step-btn.claim {
  background: var(--green); color: var(--bg);
}
.step-btn.claim:disabled {
  background: #333; color: #666; cursor: not-allowed;
}

.step-input {
  flex: 1; padding: 10px 12px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--green); font-family: 'JetBrains Mono', monospace;
  font-size: 12px; border-radius: 6px;
}
.step-input::placeholder { color: #555; }
.step-input:disabled {
  opacity: 0.5; cursor: not-allowed;
}

.step-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; margin-top: 8px;
  min-height: 16px;
}

.task-card.completed {
  border-color: rgba(163,230,53,0.3);
  opacity: 0.7;
}
.completed-badge {
  display: inline-block;
  padding: 4px 10px; background: rgba(163,230,53,0.1);
  border: 1px solid rgba(163,230,53,0.3);
  border-radius: 4px; font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: #a3e635;
  margin-top: 10px;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  background: rgba(5,5,7,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.1);
}

.bottom-nav a {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 0;
  color: #666;
  text-decoration: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: all 0.2s;
}

.bottom-nav a.active {
  color: #a3e635;
  background: rgba(163,230,53,0.05);
}

.empty-state {
  text-align: center; padding: 40px;
  color: #555;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
</style>
</head>
<body>

<div class="navbar">
  <div style="display: flex; align-items: center;">
    <a href="index.html" class="back-btn">BACK</a>
    <div class="nav-logo" style="margin-left: 12px;">
      <div class="brand">SpecimenB</div>
    </div>
  </div>
</div>

<div class="points-badge" id="points-badge">0 PTS</div>

<div class="container">
  <div class="page-header">
    <h1>Quest</h1>
    <p>Complete social tasks to earn points and qualify for the airdrop.</p>
  </div>

  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">Airdrop Progress</span>
      <span class="progress-value" id="progress-text">0 / 1000 PTS</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Tasks</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-completed" style="color: #22d3ee;">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-points" style="color: #8b5cf6;">0</div>
      <div class="stat-label">Points</div>
    </div>
  </div>

  <div class="section-title">// Active Tasks</div>
  <div id="tasks-container"></div>
</div>

<div class="bottom-nav">
  <a href="index.html">Home</a>
  <a href="tasks.html" class="active">Quest</a>
  <a href="points.html">Points</a>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('specimenb_tasks')) || [
  { id: 1, type: 'twitter', title: 'Follow SpecimenB on X', desc: 'Follow our official X account and turn on notifications for updates.', points: 50, link: 'https://x.com/specimenb' },
  { id: 2, type: 'retweet', title: 'Retweet Launch Post', desc: 'Retweet our official launch announcement to spread the word.', points: 100, link: 'https://x.com' },
  { id: 3, type: 'discord', title: 'Join Discord Community', desc: 'Join our Discord server and introduce yourself in #general.', points: 75, link: 'https://discord.gg/specimenb' },
  { id: 4, type: 'telegram', title: 'Join Telegram Group', desc: 'Join our Telegram group for real-time announcements.', points: 50, link: 'https://t.me/specimenb' },
  { id: 5, type: 'twitter', title: 'Tweet about SpecimenB', desc: 'Create an original tweet mentioning @specimenb and #DistributionMadeEasy.', points: 150, link: 'https://x.com/compose' }
];

let userPoints = parseInt(localStorage.getItem('specimenb_userpoints')) || 0;
let completed = JSON.parse(localStorage.getItem('specimenb_completed')) || [];
let taskState = JSON.parse(localStorage.getItem('specimenb_taskstate')) || {};

function saveState() {
  localStorage.setItem('specimenb_taskstate', JSON.stringify(taskState));
  localStorage.setItem('specimenb_userpoints', userPoints);
  localStorage.setItem('specimenb_completed', JSON.stringify(completed));
}

function render() {
  const container = document.getElementById('tasks-container');
  container.innerHTML = '';
  
  let done = 0;
  
  tasks.forEach(task => {
    const isDone = completed.includes(task.id);
    if (isDone) done++;
    
    const state = taskState[task.id] || { followed: false, username: '', verified: false };
    const labels = { twitter: 'X (Twitter)', discord: 'Discord', telegram: 'Telegram', retweet: 'Retweet' };
    
    const card = document.createElement('div');
    card.className = 'task-card' + (isDone ? ' completed' : '');
    
    let actionHtml = '';
    if (isDone) {
      actionHtml = '<div class="completed-badge">COMPLETED +' + task.points + ' PTS</div>';
    } else {
      actionHtml = `
        <div class="task-steps">
          <div class="step-row">
            <button class="step-btn follow" id="follow-${task.id}" onclick="followTask(${task.id})" ${state.followed ? 'disabled' : ''}>
              ${state.followed ? 'Followed' : 'Follow'}
            </button>
          </div>
          <div class="step-row">
            <input type="text" class="step-input" id="username-${task.id}" placeholder="Enter your X username (@handle)..." 
              value="${state.username}" 
              ${!state.followed || state.verified ? 'disabled' : ''}>
            <button class="step-btn verify" id="verify-${task.id}" onclick="verifyTask(${task.id})" 
              ${!state.followed || state.verified ? 'disabled' : ''}>
              ${state.verified ? 'Verified' : 'Verify'}
            </button>
          </div>
          <div class="step-row">
            <button class="step-btn claim" id="claim-${task.id}" onclick="claimTask(${task.id})" 
              ${!state.verified ? 'disabled' : ''}>
              Claim +${task.points} PTS
            </button>
          </div>
          <div class="step-status" id="status-${task.id}"></div>
        </div>
      `;
    }
    
    card.innerHTML = `
      <div class="task-header">
        <div>
          <div class="task-type ${task.type}">${labels[task.type]}</div>
          <div class="task-title">${task.title}</div>
          <div class="task-desc">${task.desc}</div>
        </div>
        <div class="task-points">+${task.points}</div>
      </div>
      ${actionHtml}
    `;
    container.appendChild(card);
  });
  
  document.getElementById('stat-total').innerText = tasks.length;
  document.getElementById('stat-completed').innerText = done;
  document.getElementById('stat-points').innerText = userPoints;
  document.getElementById('points-badge').innerText = userPoints + ' PTS';
  
  const pct = Math.min((userPoints / 1000) * 100, 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').innerText = userPoints + ' / 1000 PTS';
}

function followTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  window.open(task.link, '_blank');
  taskState[id] = taskState[id] || {};
  taskState[id].followed = true;
  saveState();
  render();
}

function verifyTask(id) {
  const username = document.getElementById('username-' + id).value.trim();
  if (!username) {
    document.getElementById('status-' + id).innerHTML = '<span style="color: #ef4444">Enter username!</span>';
    return;
  }
  document.getElementById('status-' + id).innerHTML = '<span style="color: #f59e0b">Verifying...</span>';
  setTimeout(() => {
    taskState[id] = taskState[id] || {};
    taskState[id].verified = true;
    taskState[id].username = username;
    saveState();
    document.getElementById('status-' + id).innerHTML = '<span style="color: #a3e635">Verified! Click Claim.</span>';
    render();
  }, 1500);
}

function claimTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  completed.push(id);
  userPoints += task.points;
  let submissions = JSON.parse(localStorage.getItem('specimenb_submissions')) || [];
  submissions.push({
    id: Date.now(),
    taskId: id,
    username: taskState[id]?.username || '',
    proof: taskState[id]?.username || '',
    status: 'pending',
    timestamp: new Date().toISOString()
  });
  localStorage.setItem('specimenb_submissions', JSON.stringify(submissions));
  saveState();
  render();
}

render();
</script>

</body>
</html>
