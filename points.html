<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpecimenB — Points</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #050507;
  --green: #a3e635;
  --cyan: #22d3ee;
  --text: #f5f5f5;
  --text2: #8888a0;
  --border: rgba(255,255,255,0.15);
  --panel-bg: rgba(255,255,255,0.05);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
  -webkit-font-smoothing: antialiased;
}

.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px;
  background: rgba(5,5,7,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.back-btn {
  padding: 6px 14px; background: transparent;
  border: 1px solid rgba(163,230,53,0.3);
  color: #a3e635; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; cursor: pointer; border-radius: 4px;
  text-decoration: none;
}

.nav-logo .brand {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  font-weight: 700; letter-spacing: 0.1em; color: var(--text);
}

.container {
  padding: 80px 16px 40px;
  max-width: 600px; margin: 0 auto;
}

.page-header { margin-bottom: 32px; }
.page-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 32px; font-weight: 400;
}
.page-header p {
  color: var(--text2); font-size: 14px;
  margin-top: 8px; line-height: 1.6;
}

.points-big {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  text-align: center;
  margin-bottom: 24px;
}
.points-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.2em;
  margin-bottom: 8px;
}
.points-value {
  font-size: 56px;
  font-weight: 700;
  color: var(--green);
  font-family: 'Space Grotesk', sans-serif;
}
.points-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  margin-top: 8px;
}

.progress-box {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 24px;
}
.progress-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
}
.progress-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text2);
  text-transform: uppercase;
}
.progress-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--green);
  font-weight: 700;
}
.progress-bar {
  height: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 5px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 5px;
  transition: width 0.5s;
  width: 0%;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
}
.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--green);
}
.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text2);
  text-transform: uppercase;
  margin-top: 4px;
}

.completed-section {
  background: var(--panel-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
}
.section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 16px;
}
.task-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.task-row:last-child {
  border-bottom: none;
}
.task-name {
  font-size: 13px;
  color: var(--text);
}
.task-pts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--green);
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: #555;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  background: rgba(5,5,7,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.1);
}

.bottom-nav a {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 0;
  color: #666;
  text-decoration: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: all 0.2s;
}

.bottom-nav a.active {
  color: #a3e635;
  background: rgba(163,230,53,0.05);
}
</style>
</head>
<body>

<div class="navbar">
  <div style="display: flex; align-items: center;">
    <a href="index.html" class="back-btn">BACK</a>
    <div class="nav-logo" style="margin-left: 12px;">
      <div class="brand">SpecimenB</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <h1>Points</h1>
    <p>Track your progress and airdrop qualification.</p>
  </div>

  <div class="points-big">
    <div class="points-label">Total Points</div>
    <div class="points-value" id="total-points">0</div>
    <div class="points-sub">Earn more by completing quests</div>
  </div>

  <div class="progress-box">
    <div class="progress-header">
      <span class="progress-title">Airdrop Qualification</span>
      <span class="progress-value" id="progress-text">0 / 1000 PTS</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-tasks">0</div>
      <div class="stat-label">Tasks Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-pending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <div class="completed-section">
    <div class="section-title">Completed Tasks</div>
    <div id="completed-list">
      <div class="empty-state">No tasks completed yet. Go to Quest to start!</div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <a href="index.html">Home</a>
  <a href="tasks.html">Quest</a>
  <a href="points.html" class="active">Points</a>
</div>

<script>
function loadData() {
  return {
    tasks: JSON.parse(localStorage.getItem('specimenb_tasks')) || [],
    completed: JSON.parse(localStorage.getItem('specimenb_completed')) || [],
    userPoints: parseInt(localStorage.getItem('specimenb_userpoints')) || 0
  };
}

function render() {
  const data = loadData();
  
  document.getElementById('total-points').innerText = data.userPoints;
  document.getElementById('stat-tasks').innerText = data.completed.length;
  document.getElementById('stat-pending').innerText = data.tasks.length - data.completed.length;
  
  const pct = Math.min((data.userPoints / 1000) * 100, 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').innerText = data.userPoints + ' / 1000 PTS';
  
  const list = document.getElementById('completed-list');
  if (data.completed.length === 0) {
    list.innerHTML = '<div class="empty-state">No tasks completed yet. Go to Quest to start!</div>';
  } else {
    list.innerHTML = '';
    data.completed.forEach(id => {
      const task = data.tasks.find(t => t.id === id);
      if (task) {
        const row = document.createElement('div');
        row.className = 'task-row';
        row.innerHTML = `
          <span class="task-name">${task.title}</span>
          <span class="task-pts">+${task.points}</span>
        `;
        list.appendChild(row);
      }
    });
  }
}

render();
</script>

</body>
</html>
